{% extends 'base.html' %}

{% block content %}
<section class="bg-[#FFF8F0] py-20 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 text-center max-w-2xl">
        <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-[#D81B60]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        <h1 class="text-5xl font-bold text-[#5D4037] mb-4">500</h1>
        <h2 class="text-2xl md:text-3xl font-bold text-[#5D4037] mb-4">Something Went Wrong in the Oven</h2>
        <p class="text-gray-500 text-lg mb-8">Our bakers encountered an unexpected error. We're working on fixing it! Please try again later.</p>
        <a href="/" class="bg-[#5D4037] text-white font-semibold py-3 px-8 rounded-xl cursor-pointer inline-block hover:bg-[#3E2723] transition-all duration-200">
            Back to Safety
        </a>
    </div>
</section>
{% endblock %}
